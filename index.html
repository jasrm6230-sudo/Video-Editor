<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>محرر فيديو بسيط</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">🎬 <span>مونتاج</span> لايت</div>
        <button id="btnLoad" class="accent">📁 فتح ملف فيديو</button>
        <button id="btnPlay">▶ تشغيل</button>
        <button id="btnSplit">✂ قص عند المؤشر</button>
        <span class="info-badge" id="infoClips">0 مقاطع</span>
    </header>

    <div class="main-content">
        <div class="preview-container" id="previewContainer">
            <video id="previewVideo" muted playsinline></video>
            <div class="drop-hint" id="dropHint">
                <span>🎥</span> اضغط "فتح ملف" أو اسحب وأفلت
            </div>
        </div>
        <div class="timeline-container">
            <div class="timeline-toolbar">
                <button id="btnZoomIn">🔍+</button>
                <button id="btnZoomOut">🔍-</button>
                <span id="zoomLevel">1.0x</span>
            </div>
            <div class="timeline-canvas-wrap" id="timelineWrap">
                <canvas id="timelineCanvas"></canvas>
            </div>
            <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
        </div>
    </div>

    <script src="editor.js"></script>
</body>
</html>
